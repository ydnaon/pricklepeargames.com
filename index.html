<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prickle Pear Games</title>
<meta name="description" content="Prickle Pear Games — maker of Doodle Defender, a doodle survivors game.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f7f2e0;
    --ink: #2b2a33;
    --blue: #2b50c8;
    --pink: #e0457b;
    --green: #2bd33c;
    --faint: rgba(43, 42, 51, 0.62);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 43px,
      rgba(88, 109, 136, 0.16) 43px, rgba(88, 109, 136, 0.16) 45px
    );
    color: var(--ink);
    font: 17px/1.6 Georgia, 'Times New Roman', serif;
    display: grid;
    place-items: center;
  }
  main { text-align: center; padding: 40px 24px; }
  .doodle {
    width: 84px; height: 84px;
    margin: 0 auto 6px;
    background: var(--green);
    border: 6px solid var(--ink);
    border-radius: 8px;
    position: relative;
    transform: rotate(-2deg);
  }
  .doodle::before, .doodle::after {
    content: "";
    position: absolute;
    top: 26px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--ink);
  }
  .doodle::before { left: 18px; }
  .doodle::after { right: 18px; }
  .doodle .mouth {
    position: absolute;
    left: 50%; bottom: 20px;
    width: 26px; height: 5px;
    margin-left: -13px;
    background: var(--ink);
    border-radius: 3px;
  }
  h1 {
    font-family: 'Patrick Hand', 'Comic Sans MS', cursive;
    font-weight: 400;
    font-size: 52px;
    margin: 10px 0 2px;
    color: var(--blue);
  }
  h1 .accent { color: var(--pink); }
  .tag { color: var(--faint); margin: 0 0 30px; }
  .card {
    display: inline-block;
    border: 2px solid var(--ink);
    border-radius: 14px;
    background: #fffdf6;
    box-shadow: 4px 4px 0 rgba(43, 42, 51, 0.18);
    padding: 18px 26px;
    text-align: left;
    max-width: 420px;
  }
  .card h2 {
    font-family: 'Patrick Hand', cursive;
    font-weight: 400;
    font-size: 28px;
    margin: 0 0 4px;
    color: var(--blue);
  }
  .card p { margin: 6px 0; }
  .badge {
    display: inline-block;
    font-family: 'Patrick Hand', cursive;
    font-size: 15px;
    color: var(--pink);
    border: 2px solid var(--pink);
    border-radius: 999px;
    padding: 1px 12px;
    margin-bottom: 8px;
  }
  footer { margin-top: 34px; font-size: 14px; color: var(--faint); }
  footer a { color: var(--blue); }
</style>
</head>
<body>
<main>
  <div class="doodle"><span class="mouth"></span></div>
  <h1>Prickle <span class="accent">Pear</span> Games</h1>
  <p class="tag">tiny games, drawn by hand</p>

  <div class="card">
    <span class="badge">in closed testing</span>
    <h2>Doodle Defender</h2>
    <p>A doodle survivors game. Outlast waves of runaway sketches on a living sheet of notebook paper — draft weapons, fuse them into ultimates, and face the MEGA DOODLE.</p>
  </div>

  <footer>
    <a href="privacy.html">Privacy Policy</a> · © 2026 Prickle Pear Games
  </footer>
</main>
</body>
</html>
